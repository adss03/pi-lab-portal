{% extends "base.html" %}
{% block title %}Dashboard — Pi Lab Portal{% endblock %}
{% block content %}
<div class="dashboard-wrap">
    <header>
        <h1>Pi Lab Portal</h1>
        <nav>
            <span>{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit">Sign out</button>
            </form>
        </nav>
    </header>
    <main>
        <p>Welcome to your homelab portal.</p>
    </main>
</div>
{% endblock %}
