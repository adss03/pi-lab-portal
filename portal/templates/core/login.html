{% extends "base.html" %}
{% block title %}Login — Pi Lab Portal{% endblock %}
{% block content %}
<div class="login-wrap">
    <h1>Pi Lab Portal</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
    </form>
    {% if form.errors %}
    <p class="error">Invalid username or password.</p>
    {% endif %}
</div>
{% endblock %}
